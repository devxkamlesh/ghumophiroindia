name: Deploy

# On push to main: verify + build/push Docker images to GHCR (safe, no prod change).
# Deploy is MANUAL (workflow_dispatch) until the PM2 -> Docker cutover is done.
# After the first verified cutover, remove the `if:` on the deploy job to enable
# auto-deploy on push.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'infrastructure/monitoring/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  BACKEND_IMAGE: ghcr.io/devxkamlesh/ghumo-backend
  FRONTEND_IMAGE: ghcr.io/devxkamlesh/ghumo-frontend

jobs:
  verify:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck

  build-and-push:
    name: Build & push images
    needs: verify
    # Native ARM64 runner — the VPS is aarch64 (Oracle Ampere), so images must be
    # arm64. Free for public repos; avoids slow QEMU cross-builds.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: ghcr.io/devxkamlesh/ghumo-backend
            context: ./backend
            dockerfile: ./infrastructure/docker/Dockerfile.backend
            build_args: ''
          - name: frontend
            image: ghcr.io/devxkamlesh/ghumo-frontend
            context: ./frontend
            dockerfile: ./infrastructure/docker/Dockerfile.frontend
            build_args: |
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://ghumofiroindia.com/api/v1' }}
              NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://ghumofiroindia.com' }}
              NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID || 'G-VNTQ3X32JE' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/arm64
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          script_stop: true
          envs: GHCR_TOKEN,GHCR_USER,GIT_SHA
          script: |
            set -e
            PROJECT_DIR="/var/www/ghumo-phiro"
            COMPOSE_DIR="$PROJECT_DIR/infrastructure/docker"
            COMPOSE="docker compose -f docker-compose.production.yml"

            cd "$PROJECT_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            cd "$COMPOSE_DIR"

            # Record currently-running images so we can roll back if the new ones fail.
            PREV_BACKEND="$(docker inspect --format '{{.Config.Image}}' ghumo-backend 2>/dev/null || true)"
            PREV_FRONTEND="$(docker inspect --format '{{.Config.Image}}' ghumo-frontend 2>/dev/null || true)"

            export BACKEND_IMAGE="ghcr.io/devxkamlesh/ghumo-backend:${{ github.sha }}"
            export FRONTEND_IMAGE="ghcr.io/devxkamlesh/ghumo-frontend:${{ github.sha }}"
            $COMPOSE pull
            $COMPOSE up -d

            # Health-check backend AND frontend, with retries.
            ok=0
            for i in $(seq 1 20); do
              if curl -fsS http://localhost:4000/api/v1/health >/dev/null 2>&1 \
                 && curl -fsS http://localhost:3000/ >/dev/null 2>&1; then
                ok=1; break
              fi
              sleep 3
            done

            if [ "$ok" != "1" ]; then
              echo "::error::Health check failed after deploy of ${{ github.sha }}"
              if [ -n "$PREV_BACKEND" ] && [ -n "$PREV_FRONTEND" ]; then
                echo "Rolling back to $PREV_BACKEND / $PREV_FRONTEND"
                export BACKEND_IMAGE="$PREV_BACKEND"
                export FRONTEND_IMAGE="$PREV_FRONTEND"
                $COMPOSE up -d
                echo "Rollback complete — site remains on the previous good version."
              else
                echo "No previous images to roll back to (first deploy)."
              fi
              exit 1
            fi

            echo "Deploy healthy: ${{ github.sha }}"
            docker image prune -f

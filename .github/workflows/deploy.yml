name: Deploy

# Runs on every push to main (e.g. after a PR merge) or manually from the
# Actions tab. The build is verified first; only if it passes do we deploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at the same time.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: |
          npm run lint -w backend
          npm run lint -w frontend
      - run: npm run typecheck
      - run: npm run build

  deploy:
    name: Deploy to VPS
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -e

            # Load Node/npm/pm2 into PATH (works for nvm or system installs)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$PATH:/usr/local/bin:/usr/bin"

            PROJECT_DIR="/var/www/ghumo-phiro"
            cd "$PROJECT_DIR"

            echo "📥 Syncing to origin/main (discards local changes to tracked files; .env is git-ignored and preserved)..."
            git fetch origin main
            git reset --hard origin/main

            echo "🔧 Building backend..."
            cd "$PROJECT_DIR/backend"
            npm install --no-audit --no-fund
            npm run build

            echo "🎨 Building frontend..."
            cd "$PROJECT_DIR/frontend"
            npm install --no-audit --no-fund
            npm run build

            echo "📁 Ensuring log directories exist..."
            mkdir -p "$PROJECT_DIR/backend/logs" "$PROJECT_DIR/frontend/logs"

            echo "🔄 Reloading PM2 (zero-downtime where possible)..."
            cd "$PROJECT_DIR"
            pm2 startOrReload ecosystem.config.js --update-env
            pm2 save

            echo "🔍 Health check..."
            sleep 4
            curl -fsS http://localhost:4000/api/v1/health > /dev/null && echo "✅ Backend healthy"
            echo "✅ Deploy complete"

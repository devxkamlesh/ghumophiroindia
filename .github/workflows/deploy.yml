name: Deploy

# On push to main: verify + build/push Docker images to GHCR (safe, no prod change).
# Deploy is MANUAL (workflow_dispatch) until the PM2 -> Docker cutover is done.
# After the first verified cutover, remove the `if:` on the deploy job to enable
# auto-deploy on push.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  BACKEND_IMAGE: ghcr.io/devxkamlesh/ghumo-backend
  FRONTEND_IMAGE: ghcr.io/devxkamlesh/ghumo-frontend

jobs:
  verify:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  build-and-push:
    name: Build & push images
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: ghcr.io/devxkamlesh/ghumo-backend
            context: ./backend
            dockerfile: ./infrastructure/docker/Dockerfile.backend
            build_args: ''
          - name: frontend
            image: ghcr.io/devxkamlesh/ghumo-frontend
            context: ./frontend
            dockerfile: ./infrastructure/docker/Dockerfile.frontend
            build_args: |
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://ghumofiroindia.com/api/v1' }}
              NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://ghumofiroindia.com' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    # SAFETY GATE: manual only until PM2 -> Docker cutover is complete.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          script_stop: true
          envs: GHCR_TOKEN,GHCR_USER,GIT_SHA
          script: |
            set -e
            PROJECT_DIR="/var/www/ghumo-phiro"
            COMPOSE_DIR="$PROJECT_DIR/infrastructure/docker"

            cd "$PROJECT_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            cd "$COMPOSE_DIR"
            export BACKEND_IMAGE="ghcr.io/devxkamlesh/ghumo-backend:${{ github.sha }}"
            export FRONTEND_IMAGE="ghcr.io/devxkamlesh/ghumo-frontend:${{ github.sha }}"
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d
            docker image prune -f

            echo "Waiting for backend health..."
            for i in $(seq 1 15); do
              if curl -fsS http://localhost:4000/api/v1/health >/dev/null 2>&1; then
                echo "Backend healthy"; break
              fi
              sleep 3
            done
            curl -fsS http://localhost:4000/api/v1/health

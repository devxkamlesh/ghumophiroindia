apiVersion: 1

contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram_cp
        type: telegram
        # Secrets injected from the container env (gitignored .env) — never in the repo.
        settings:
          # Token stays secret (env); chat ID is not sensitive (useless without the token).
          bottoken: "$__env{TELEGRAM_BOT_TOKEN}"
          chatid: "5496616149"
          parse_mode: "HTML"
          message: '{{ template "telegram.message" . }}'
        disableResolveMessage: false
      - uid: email_cp
        type: email
        settings:
          addresses: kamleshgchoudhary007@gmail.com
          singleEmail: true
        disableResolveMessage: false

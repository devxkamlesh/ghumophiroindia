# Production stack for ghumofiroindia.com
# Run on the VPS:  docker compose -f docker-compose.production.yml up -d
# Secrets/config come from a `.env` file next to this file (see .env.docker.example).
# Host nginx proxies to the published 127.0.0.1:3000 / :4000 ports.

name: ghumo

services:
  postgres:
    image: postgres:16-alpine
    container_name: ghumo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port published: the backend reaches it over the Docker network as
    # `postgres:5432`. This avoids colliding with any host Postgres on 5432.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ghumo-network]

  redis:
    image: redis:7-alpine
    container_name: ghumo-redis
    restart: unless-stopped
    command: >
      redis-server --appendonly yes
      --maxmemory 512mb --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ghumo-network]

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/devxkamlesh/ghumo-backend:latest}
    container_name: ghumo-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      DB_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "127.0.0.1:4000:4000"
    networks: [ghumo-network]

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/devxkamlesh/ghumo-frontend:latest}
    container_name: ghumo-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Server-side reads these at runtime; client bundles have them inlined at build.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    depends_on:
      backend: { condition: service_started }
    ports:
      - "127.0.0.1:3000:3000"
    networks: [ghumo-network]

volumes:
  postgres_data:
  redis_data:

networks:
  ghumo-network:
    driver: bridge
